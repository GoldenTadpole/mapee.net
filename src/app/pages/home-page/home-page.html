<app-page-shell
  title="Explore Minecraft worlds from above."
  intro="Mapee turns saved Minecraft worlds from Alpha to 26.2 into fast, readable 2D renders."
  [homeTitle]="true"
>
  <div class="home-layout">
    <div class="home-description">
      <p>Switch dimensions, inspect terrain, filter blocks, find slime chunks, and measure distance without opening the game.</p>
      <p>Use it as a lightweight companion for exploring large worlds, checking builds from above, and generating clean map views without changing your world files.</p>
    </div>

    <app-image-slideshow [samples]="samples" />
  </div>
</app-page-shell>
